[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 3003
  port = 8888
  autoLaunch = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# SPA: index ve istemci rotaları önbelleğe alınmasın (eski HTML yeni chunk adlarına
# işaret edince "Importing a module script failed" oluşur). /assets/* daha spesifik
# olduğu için aşağıdaki uzun önbellek ile üst üste binmez.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

